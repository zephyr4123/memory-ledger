# memory-ledger —— 全栈对话式记忆台, 一行起.
#
#   docker compose up --build         起 db + api + web; 浏览器开 http://localhost:8080
#   docker compose down -v            停并清数据卷
#
# 真 LLM 对话需要 LLM_API_KEY (+ 可选 LLM_MODEL/LLM_BASE_URL, 放进 .env, 见 .env.example);
# 不配则 api 以 mock 模式运行 —— 全栈仍可起、可看 seed 数据/时光机/溯源, 仅对话非真智能。
name: memory-ledger

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: memory_ledger
      POSTGRES_PASSWORD: memory_ledger
      POSTGRES_DB: memory_ledger
    # ⚠️ 开发/demo 档调优: 一次性演示库, 非生产数据. 关闭 fsync 等换写入吞吐,
    #    崩溃可能损坏数据 —— 严禁用于真实数据.
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=50
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432" # 宿主端口可用 .env 的 DB_PORT 覆盖 (默认 5433)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  api:
    build:
      context: . # 上下文=仓库根 (需同时访问库源码与 api/)
      dockerfile: api/Dockerfile
    image: memory-ledger-api:local
    depends_on:
      db:
        condition: service_healthy # db 健康才起, 杜绝竞态
    environment:
      DATABASE_URL: postgresql://memory_ledger:memory_ledger@db:5432/memory_ledger
      # LiteLLM 统一接入: 改这三个 env 即可换任意模型 (见 .env.example)
      LLM_MODEL: ${LLM_MODEL:-deepseek/deepseek-v4-pro}
      LLM_API_KEY: ${LLM_API_KEY:-} # 空=mock 模式
      LLM_BASE_URL: ${LLM_BASE_URL:-}
    ports:
      - "${API_PORT:-8000}:8000" # 宿主端口被占时用 .env 的 API_PORT 覆盖
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').getcode()==200 else 1)\""
      interval: 3s
      timeout: 4s
      retries: 20
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: memory-ledger-web:local
    depends_on:
      api:
        condition: service_healthy # api 就绪才放行 (nginx 反代 /api)
    ports:
      - "${WEB_PORT:-8080}:80" # 浏览器入口; 被占时用 .env 的 WEB_PORT 覆盖

  # 可选: 原命令行脚本 demo (6 轮剧本打印到日志), 默认不起。
  #   docker compose --profile demo run --rm demo
  demo:
    profiles: ["demo"]
    build:
      context: .
      dockerfile: Dockerfile
    image: memory-ledger:local
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://memory_ledger:memory_ledger@db:5432/memory_ledger

volumes:
  pgdata:
